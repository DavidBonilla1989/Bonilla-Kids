<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bonilla Kids</title><style>body{margin:0;font-family:system-ui,Arial;background:linear-gradient(#fff0c9,#dff8ff);color:#203047}.app{max-width:960px;margin:auto;padding:14px}.blur{filter:blur(4px)}h1{text-align:center;font-size:clamp(32px,9vw,58px);margin:8px}.sub{text-align:center;font-size:22px;font-weight:900}.tabs,.bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:12px}.btn{border:0;border-radius:22px;padding:15px 18px;font-size:18px;font-weight:1000;background:#ff73a6;color:white;box-shadow:0 6px 0 #0002}.blue{background:#42bff5}.green{background:#30b85f}.purple{background:#7c3aed}.sound{position:fixed;right:16px;bottom:18px;z-index:20;width:74px;height:74px;border-radius:50%;font-size:34px}.panel{background:white;border-radius:30px;text-align:center;padding:15px;margin:12px 0 16px;box-shadow:0 8px 24px #0001}.question{font-size:clamp(25px,7vw,46px);font-weight:1000;color:#7c3aed;min-height:58px}.score{font-size:22px;font-weight:1000}.msg{min-height:34px;font-size:25px;font-weight:1000}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px}.card{background:#fff;border-radius:28px;padding:12px;text-align:center;min-height:240px;display:flex;flex-direction:column;justify-content:center;gap:8px;box-shadow:0 8px 20px #0001;border:5px solid transparent;transition:.18s}.card:active{transform:scale(.97)}.card.ok{animation:jump .55s ease;border-color:#ffd43b;box-shadow:0 0 35px #ffd43b}.emoji{font-size:92px}.word{font-size:30px;font-weight:1000}.es{font-size:18px;font-weight:900;opacity:.7}.good{color:#30b85f}.bad{color:#ef4444}.overlay{position:fixed;inset:0;display:none;place-items:center;z-index:30;background:#ffffff33}.x{font-size:min(48vw,230px);font-weight:1000;color:#ef4444cc;text-shadow:0 10px 30px #0003;animation:pop .25s}.balloons{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:25}.balloon{position:absolute;bottom:-90px;width:42px;height:54px;border-radius:50% 50% 45% 45%;animation:up 2.7s ease-in forwards;opacity:.95}.balloon:after{content:"";position:absolute;left:50%;bottom:-15px;width:2px;height:22px;background:#777}@keyframes up{to{transform:translateY(-115vh) rotate(18deg);opacity:0}}@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}@keyframes jump{0%,100%{transform:translateY(0) scale(1)}45%{transform:translateY(-18px) scale(1.06)}}@media(max-width:430px){.cards{grid-template-columns:repeat(2,1fr)}.card{min-height:205px}.emoji{font-size:76px}.word{font-size:25px}.btn{font-size:16px}.sound{width:66px;height:66px}}</style></head><body><div id="app" class="app"><h1>⭐ Bonilla Kids ⭐</h1><div class="sub">Listen, touch and learn!</div><div class="tabs"><button class="btn purple" onclick="showTrain()">📚 Entrenar</button><button class="btn green" onclick="showGame()">🎮 Jugar</button></div><div id="gameBar" class="bar"><button class="btn green" onclick="newRound()">🎲 Nueva pregunta</button><button class="btn blue" onclick="listenAll()">🔊 Escuchar todo</button></div><div class="panel"><div id="mode">Modo entrenamiento</div><div id="question" class="question">Toca una imagen</div><div class="score">⭐ Puntos: <span id="score">0</span></div><div id="msg" class="msg"></div></div><section id="cards" class="cards"></section></div><button id="soundBtn" class="btn blue sound" onclick="repeatPrompt()">🔊</button><div id="badOverlay" class="overlay"><div class="x">✕</div></div><div id="balloons" class="balloons"></div><script>const items=[{word:'dog',es:'perro',emoji:'🐶'},{word:'cat',es:'gato',emoji:'🐱'},{word:'elephant',es:'elefante',emoji:'🐘'},{word:'pants',es:'pantalón',emoji:'👖'},{word:'shoes',es:'zapatos',emoji:'👟'},{word:'sweater',es:'suéter',emoji:'🧥'},{word:'T-shirt',es:'camiseta',emoji:'👕'},{word:'skirt',es:'falda',emoji:'👗'}];const appEl=document.getElementById('app'),cardsEl=document.getElementById('cards'),modeEl=document.getElementById('mode'),questionEl=document.getElementById('question'),msgEl=document.getElementById('msg'),scoreEl=document.getElementById('score'),badOverlayEl=document.getElementById('badOverlay'),balloonsEl=document.getElementById('balloons'),gameBarEl=document.getElementById('gameBar'),soundBtnEl=document.getElementById('soundBtn');let target=null,locked=false,mode='train',score=Number(localStorage.getItem('bk-score')||0);scoreEl.textContent=score;function voice(t,lang='en-US',rate=.72,pitch=1.25){try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang=lang;u.rate=rate;u.pitch=pitch;speechSynthesis.speak(u)}catch(e){}}function repeatPrompt(){if(mode==='game'&&target)voice('Where is the '+target.word+'?')}function shuffle(a){return[...a].sort(()=>Math.random()-.5)}function showTrain(){mode='train';target=null;locked=false;gameBarEl.style.display='none';soundBtnEl.style.display='none';modeEl.textContent='Entrenamiento';questionEl.textContent='Toca una imagen y escucha';msgEl.className='msg';msgEl.textContent='Aquí no hay errores: solo practicar.';renderTrain()}function renderTrain(){cardsEl.innerHTML='';items.forEach(it=>{let d=document.createElement('div');d.className='card';d.addEventListener('click',function(){voice(it.word);msgEl.className='msg good';msgEl.textContent='Repite: '+it.word});d.innerHTML='<div class="emoji">'+it.emoji+'</div><div class="word">'+it.word+'</div><div class="es">'+it.es+'</div><button class="btn blue">🔊 Pronunciar</button>';cardsEl.appendChild(d)})}function showGame(){mode='game';gameBarEl.style.display='flex';soundBtnEl.style.display='block';newRound()}function newRound(){mode='game';gameBarEl.style.display='flex';soundBtnEl.style.display='block';locked=false;target=items[Math.floor(Math.random()*items.length)];let count=2+Math.floor(Math.random()*3);let others=shuffle(items.filter(x=>x.word!==target.word)).slice(0,count-1);let opts=shuffle([target,...others]);modeEl.textContent='Juego';questionEl.textContent='Where is the '+target.word+'?';msgEl.className='msg';msgEl.textContent='Escucha y toca la imagen correcta';renderGame(opts);setTimeout(repeatPrompt,350)}function renderGame(opts){cardsEl.innerHTML='';opts.forEach(it=>{let d=document.createElement('div');d.className='card';d.addEventListener('click',function(){choose(it,d)});d.innerHTML='<div class="emoji">'+it.emoji+'</div><div class="word">'+it.word+'</div><div class="es">'+it.es+'</div>';cardsEl.appendChild(d)})}function choose(it,el){if(locked||!target)return;if(it.word===target.word){locked=true;el.classList.add('ok');msgEl.className='msg good';msgEl.textContent='🎉 ¡Excelente!';score++;localStorage.setItem('bk-score',score);scoreEl.textContent=score;voice('Excellent!','en-US',.78,1.35);balloonParty();setTimeout(function(){newRound()},2800)}else{locked=true;msgEl.className='msg bad';msgEl.textContent='Intenta otra vez';appEl.classList.add('blur');badOverlayEl.style.display='grid';voice('Oh oh','en-US',.75,.75);setTimeout(function(){badOverlayEl.style.display='none';appEl.classList.remove('blur');locked=false;msgEl.className='msg';msgEl.textContent='';repeatPrompt()},1500)}}function balloonParty(){let colors=['#ff595e','#ffca3a','#8ac926','#1982c4','#6a4c93','#ff8fab','#4cc9f0'];balloonsEl.innerHTML='';for(let i=0;i<38;i++){let b=document.createElement('div');b.className='balloon';b.style.left=Math.random()*100+'vw';b.style.background=colors[i%colors.length];b.style.animationDelay=Math.random()*.45+'s';b.style.transform='scale('+(0.75+Math.random()*.75)+')';balloonsEl.appendChild(b)}setTimeout(function(){balloonsEl.innerHTML=''},3100)}function listenAll(){let i=0;function next(){if(i>=items.length){msgEl.className='msg good';msgEl.textContent='Terminamos 👏';setTimeout(newRound,900);return}let it=items[i++];questionEl.textContent=it.word;renderGame([it]);voice(it.word);setTimeout(next,1500)}next()}window.addEventListener('load',function(){showTrain()});</script></body></html>
